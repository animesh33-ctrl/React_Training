<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Cards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="pricing-section">

    <h1>Choose Your Plan</h1>
    
    <input type="checkbox" id="toggle">
    
    <!-- Toggle Switch -->
    <div class="toggle-wrapper">

        <span>Monthly</span>

        <label for="toggle" class="toggle-switch"></label>

        <span>Yearly</span>

    </div>

    <!-- Pricing Cards -->
    <div class="pricing-container">

        <!-- Basic -->
        <div class="card">

            <h2>Basic</h2>

            <div class="price">
                <span class="monthly">₹499</span>
                <span class="yearly">₹4,999</span>
            </div>

            <ul>
                <li>1 Website</li>
                <li>5 GB Storage</li>
                <li>Email Support</li>
            </ul>

            <button>Select Plan</button>

        </div>

        <!-- Popular -->
        <div class="card popular">

            <div class="badge">
                Most Popular
            </div>

            <h2>Pro</h2>

            <div class="price">
                <span class="monthly">₹999</span>
                <span class="yearly">₹9,999</span>
            </div>

            <ul>
                <li>10 Websites</li>
                <li>50 GB Storage</li>
                <li>Priority Support</li>
            </ul>

            <button>Select Plan</button>

        </div>

        <!-- Premium -->
        <div class="card">

            <h2>Enterprise</h2>

            <div class="price">
                <span class="monthly">₹1999</span>
                <span class="yearly">₹19,999</span>
            </div>

            <ul>
                <li>Unlimited Websites</li>
                <li>200 GB Storage</li>
                <li>24/7 Support</li>
            </ul>

            <button>Select Plan</button>

        </div>

    </div>

</section>

</body>
</html>
