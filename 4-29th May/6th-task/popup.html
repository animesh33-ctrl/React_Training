<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Only Modal Popup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Hidden Checkbox -->
    <input type="checkbox" id="popup-toggle">

    <!-- Open Button -->
    <label for="popup-toggle" class="open-btn">
        Open Popup
    </label>

    <!-- Modal -->
    <div class="modal">

        <div class="popup">

            <!-- Close Button -->
            <label for="popup-toggle" class="close-btn">
                &times;
            </label>

            <h2>Popup Modal</h2>

            <p>
                This popup is created using only HTML and CSS
                with the checkbox hack.
            </p>

        </div>

    </div>

</body>
</html>
