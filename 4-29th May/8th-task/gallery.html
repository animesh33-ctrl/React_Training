<!-- ✅ 8. Image Gallery with Masonry Layout
Goal: Pinterest-style layout
Requirements:
• Different image heights
• Responsive columns
• Hover overlay (title, button)
Concepts: CSS columns / grid + object-fit + overlays
• CSS Columns OR Grid (auto-fill / auto-fit)
• Object-fit (cover)
• Overlay using position: absolute
• Hover effects (opacity, scale)
• Responsive image sizing
• Aspect ratio control -->
